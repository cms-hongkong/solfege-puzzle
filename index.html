<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂階梯大冒險 | 隨機階梯挑戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 100%;
            max-width: 1000px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            padding: 25px;
        }
        
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            color: #ff6b6b;
            font-size: 2.8rem;
            text-shadow: 3px 3px 0 #ffd93d;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #4b4b4b;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #e9f5ff;
            border-radius: 15px;
            padding: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .mode-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        
        .mode-icon {
            font-size: 1.8rem;
        }
        
        .score-board {
            display: flex;
            gap: 20px;
        }
        
        .score-item {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .instructions {
            background: #e9f5ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 8px solid #4d96ff;
        }
        
        .instructions h2 {
            color: #2575fc;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        .instructions p {
            color: #333;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .current-challenge {
            background: #fff9e6;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border: 2px dashed #ff9a3d;
        }
        
        .challenge-numbers {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
            justify-content: center;
        }
        
        .challenge-number {
            background: #6a11cb;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        @media (min-width: 768px) {
            .game-area {
                flex-direction: row;
            }
        }
        
        .staircase-container {
            flex: 2;
            background: #f8f9ff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.1);
        }
        
        .staircase {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            position: relative;
        }
        
        .step {
            width: 90%;
            height: 70px;
            background: white;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            border: 4px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            cursor: pointer;
        }
        
        .step.filled {
            transform: scale(1.05);
            border-color: #ffd93d;
        }
        
        .step-label {
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
            color: #888;
        }
        
        .step-number {
            position: absolute;
            right: 20px;
            background: #6a11cb;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .staircase-line {
            position: absolute;
            width: 8px;
            background: linear-gradient(to bottom, #ff6b6b, #4d96ff);
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            border-radius: 4px;
        }
        
        .cards-container {
            flex: 1.5;
            background: #fff9e6;
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .cards-title {
            text-align: center;
            color: #ff9a3d;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            flex-grow: 1;
        }
        
        .solfege-card {
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            cursor: grab;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            user-select: none;
            text-align: center;
            position: relative;
        }
        
        .solfege-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.25);
        }
        
        .solfege-card:active {
            transform: scale(0.95);
            cursor: grabbing;
        }
        
        .solfege-card .animal-icon {
            font-size: 1.5rem;
            margin-top: 5px;
        }
        
        .card-do { background: linear-gradient(135deg, #FF6B6B, #FF8E8E); }
        .card-re { background: linear-gradient(135deg, #FF9A3D, #FFB56B); }
        .card-mi { background: linear-gradient(135deg, #FFD93D, #FFE57F); }
        .card-fa { background: linear-gradient(135deg, #6BCF7F, #8FDF9E); }
        .card-sol { background: linear-gradient(135deg, #4D96FF, #6BAAFF); }
        .card-la { background: linear-gradient(135deg, #9D4EDD, #B26FE6); }
        .card-ti { background: linear-gradient(135deg, #FF6B9D, #FF8EB5); }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }
        
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            line-height: 1.5;
        }
        
        .message.success {
            background-color: #e7f7e7;
            color: #2e7d32;
            border: 3px solid #a5d6a7;
        }
        
        .message.info {
            background-color: #e3f2fd;
            color: #1565c0;
            border: 3px solid #90caf9;
        }
        
        .message.warning {
            background-color: #fff8e1;
            color: #ff8f00;
            border: 3px solid #ffd54f;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        #check-btn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            flex: 2;
        }
        
        #next-btn {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            flex: 1;
        }
        
        #reset-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff9a3d);
            color: white;
            flex: 1;
        }
        
        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .progress-container {
            margin-top: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4d96ff, #6a11cb);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        
        .level-indicator {
            text-align: center;
            margin-top: 10px;
            font-size: 1.1rem;
            color: #4b4b4b;
        }
        
        .animal-icon {
            margin-right: 5px;
        }
        
        .step.filled .animal-icon {
            animation: bounce 0.5s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .celebrate {
            animation: celebrate 0.5s ease 3;
        }
        
        .correct-feedback {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #4CAF50;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        
        .incorrect-feedback {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #f44336;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        
        .position-hint {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .challenge-counter {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 15px;
            color: #6a11cb;
            font-weight: bold;
        }
        
        .random-challenge-info {
            text-align: center;
            font-size: 1.1rem;
            margin-top: 10px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🎵 音樂階梯大冒險 🎵</h1>
            <p class="subtitle">每次都是不同的階梯組合挑戰！</p>
        </header>
        
        <div class="game-info">
            <div class="mode-indicator">
                <span class="mode-icon" id="mode-icon">🎲</span>
                <div>
                    <div id="mode-name">隨機挑戰</div>
                    <div id="challenge-desc">每次題目都不同！</div>
                </div>
            </div>
            
            <div class="score-board">
                <div class="score-item">
                    <span>挑戰:</span>
                    <span id="challenge-count">1</span>
                </div>
                <div class="score-item">
                    <span>分數:</span>
                    <span id="score">0</span>
                </div>
                <div class="score-item">
                    <span>最高分:</span>
                    <span id="high-score">0</span>
                </div>
            </div>
        </div>
        
        <div class="instructions">
            <h2>📚 遊戲規則：</h2>
            <p>每關都有隨機選擇的階梯組合！</p>
            <p>記住固定配對：1=Do, 2=Re, 3=Mi, 4=Fa, 5=Sol, 6=La, 7=Ti, 8=Do</p>
            
            <div class="current-challenge">
                <h3>🎯 當前挑戰階梯：</h3>
                <div class="challenge-numbers" id="current-challenge-numbers">
                    </div>
                <div class="random-challenge-info" id="random-challenge-info">
                    將卡片放到顯示的階梯上！
                </div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="staircase-container">
                <h2 style="text-align: center; color: #6a11cb; margin-bottom: 20px;">🎼 音樂階梯 🎼</h2>
                <div class="staircase">
                    <div class="staircase-line"></div>
                    
                    <div class="step" data-position="8">
                        <span class="step-label">第8階</span>
                        <div class="step-number">8</div>
                    </div>
                    <div class="step" data-position="7">
                        <span class="step-label">第7階</span>
                        <div class="step-number">7</div>
                    </div>
                    <div class="step" data-position="6">
                        <span class="step-label">第6階</span>
                        <div class="step-number">6</div>
                    </div>
                    <div class="step" data-position="5">
                        <span class="step-label">第5階</span>
                        <div class="step-number">5</div>
                    </div>
                    <div class="step" data-position="4">
                        <span class="step-label">第4階</span>
                        <div class="step-number">4</div>
                    </div>
                    <div class="step" data-position="3">
                        <span class="step-label">第3階</span>
                        <div class="step-number">3</div>
                    </div>
                    <div class="step" data-position="2">
                        <span class="step-label">第2階</span>
                        <div class="step-number">2</div>
                    </div>
                    <div class="step" data-position="1">
                        <span class="step-label">第1階</span>
                        <div class="step-number">1</div>
                    </div>
                </div>
            </div>
            
            <div class="cards-container">
                <h2 class="cards-title">🎴 可用卡片 🎴</h2>
                <div class="cards-grid" id="cards-grid">
                    </div>
                
                <div class="controls">
                    <div class="message info" id="message">
                        拖動卡片到顯示的階梯上！記住固定配對
                    </div>
                    
                    <div class="buttons">
                        <button id="check-btn">✅ 檢查答案</button>
                        <button id="next-btn" style="display: none;">➡️ 下一關</button>
                        <button id="reset-btn">🔄 重新開始</button>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div class="level-indicator">
                        完成度: <span id="progress-text">0%</span> | 已放置: <span id="placed-count">0</span>/<span id="total-slots">4</span> 個位置
                    </div>
                    <div class="challenge-counter">
                        挑戰 <span id="challenge-number">1</span>：<span id="challenge-type">隨機階梯組合</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ============================================
            // 固定的階梯-唱名配對關係
            // ============================================
            const FIXED_PAIRING = {
                1: "Do",
                2: "Re",
                3: "Mi",
                4: "Fa",
                5: "Sol",
                6: "La",
                7: "Ti",
                8: "Do"
            };

            const gameState = {
                currentChallenge: 1,
                score: 0,
                highScore: localStorage.getItem('solfegeHighScore') || 0,
                currentPositions: [],
                correctOrder: {},
                availableCards: [],
                totalSlots: 0,
                steps: {},
                placedCards: 0,
                isComplete: false
            };

            const solfegeData = [
                { name: "Do", color: "card-do", animal: "🐻", correctPosition: 1 },
                { name: "Re", color: "card-re", animal: "🐰", correctPosition: 2 },
                { name: "Mi", color: "card-mi", animal: "🐱", correctPosition: 3 },
                { name: "Fa", color: "card-fa", animal: "🐸", correctPosition: 4 },
                { name: "Sol", color: "card-sol", animal: "🐶", correctPosition: 5 },
                { name: "La", color: "card-la", animal: "🦁", correctPosition: 6 },
                { name: "Ti", color: "card-ti", animal: "🐯", correctPosition: 7 },
                { name: "Do", color: "card-do", animal: "🐼", correctPosition: 8 }
            ];

            const modeIcon = document.getElementById('mode-icon');
            const modeName = document.getElementById('mode-name');
            const challengeDesc = document.getElementById('challenge-desc');
            const currentChallengeNumbers = document.getElementById('current-challenge-numbers');
            const randomChallengeInfo = document.getElementById('random-challenge-info');
            const challengeCount = document.getElementById('challenge-count');
            const scoreDisplay = document.getElementById('score');
            const highScoreDisplay = document.getElementById('high-score');
            const steps = document.querySelectorAll('.step');
            const cardsGrid = document.getElementById('cards-grid');
            const messageDiv = document.getElementById('message');
            const checkBtn = document.getElementById('check-btn');
            const nextBtn = document.getElementById('next-btn');
            const resetBtn = document.getElementById('reset-btn');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const placedCount = document.getElementById('placed-count');
            const totalSlots = document.getElementById('total-slots');
            const challengeNumber = document.getElementById('challenge-number');
            const challengeType = document.getElementById('challenge-type');

            function initGame() {
                gameState.highScore = localStorage.getItem('solfegeHighScore') || 0;
                highScoreDisplay.textContent = gameState.highScore;
                scoreDisplay.textContent = gameState.score;
                challengeCount.textContent = gameState.currentChallenge;
                
                modeIcon.textContent = "🎲";
                modeName.textContent = "隨機挑戰";
                challengeDesc.textContent = "每次題目都不同！";
                
                startNewChallenge();
                
                checkBtn.addEventListener('click', checkAnswer);
                nextBtn.addEventListener('click', startNewChallenge);
                resetBtn.addEventListener('click', resetChallenge);
                
                initDragAndDrop();
            }

            function initDragAndDrop() {
                document.addEventListener('dragover', function(e) {
                    e.preventDefault();
                });
                document.addEventListener('drop', function(e) {
                    e.preventDefault();
                });
            }

            function setupCardEvents() {
                const cards = document.querySelectorAll('.solfege-card');
                cards.forEach(card => {
                    card.addEventListener('dragstart', handleDragStart);
                    card.addEventListener('click', handleCardClick);
                });
                
                steps.forEach(step => {
                    step.addEventListener('dragover', handleDragOver);
                    step.addEventListener('drop', handleDrop);
                    step.addEventListener('click', handleStepClick);
                });
            }

            function handleDragStart(e) {
                if (gameState.isComplete) return;
                const card = e.target;
                if (!card.classList.contains('solfege-card')) return;
                if (card.style.opacity === '0.3') {
                    e.preventDefault();
                    return;
                }
                const data = {
                    solfege: card.dataset.solfege,
                    cardId: card.dataset.cardId,
                    correctPosition: card.dataset.correctPosition
                };
                e.dataTransfer.setData('application/json', JSON.stringify(data));
                e.dataTransfer.effectAllowed = 'move';
                card.classList.add('dragging');
                setTimeout(() => {
                    card.style.opacity = '0.4';
                }, 0);
            }

            function handleDragOver(e) {
                if (gameState.isComplete) return;
                const step = e.target.closest('.step');
                if (!step) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const stepPosition = parseInt(step.dataset.position);
                if (!step.classList.contains('filled') && gameState.currentPositions.includes(stepPosition)) {
                    step.style.boxShadow = '0 0 20px rgba(106, 17, 203, 0.5)';
                }
            }

            function handleDrop(e) {
                if (gameState.isComplete) return;
                const step = e.target.closest('.step');
                if (!step) return;
                e.preventDefault();
                step.style.boxShadow = '';
                const stepPosition = parseInt(step.dataset.position);
                if (!gameState.currentPositions.includes(stepPosition)) {
                    updateMessage(`第${stepPosition}階不在當前挑戰中！`, 'warning');
                    return;
                }
                if (gameState.steps[stepPosition]) {
                    updateMessage(`第${stepPosition}階已經有卡片了！`, 'warning');
                    return;
                }
                const dataText = e.dataTransfer.getData('application/json');
                if (!dataText) return;
                try {
                    const data = JSON.parse(dataText);
                    placeCard(step, stepPosition, data);
                } catch (error) {
                    console.error('拖放錯誤:', error);
                    updateMessage(`拖放失敗，請再試一次！`, 'warning');
                }
            }

            function handleCardClick(e) {
                if (gameState.isComplete) return;
                const card = e.target.closest('.solfege-card');
                if (!card) return;
                if (card.style.opacity === '0.3') {
                    updateMessage(`這張卡片已經被使用了！`, 'warning');
                    return;
                }
                for (let i = 0; i < gameState.currentPositions.length; i++) {
                    const pos = gameState.currentPositions[i];
                    if (!gameState.steps[pos]) {
                        const step = document.querySelector(`.step[data-position="${pos}"]`);
                        if (step) {
                            const data = {
                                solfege: card.dataset.solfege,
                                cardId: card.dataset.cardId,
                                correctPosition: card.dataset.correctPosition
                            };
                            placeCard(step, pos, data);
                            break;
                        }
                    }
                }
            }

            function handleStepClick(e) {
                if (gameState.isComplete) return;
                const step = e.target.closest('.step');
                if (!step) return;
                const stepPosition = parseInt(step.dataset.position);
                if (gameState.steps[stepPosition]) {
                    removeCard(stepPosition);
                }
            }

            function startNewChallenge() {
                resetGameState();
                nextBtn.style.display = 'none';
                checkBtn.style.display = 'block';
                generateRandomChallenge();
                updateProgress();
                updateMessage(`挑戰 ${gameState.currentChallenge}：把卡片放到指定的階梯上！`, 'info');
                setupCardEvents();
            }

            function generateRandomChallenge() {
                const numSlots = Math.floor(Math.random() * 4) + 3;
                gameState.totalSlots = numSlots;
                totalSlots.textContent = numSlots;
                resetStaircaseDisplay();
                const allPositions = [1, 2, 3, 4, 5, 6, 7, 8];
                shuffleArray(allPositions);
                gameState.currentPositions = allPositions.slice(0, numSlots);
                gameState.currentPositions.sort((a, b) => a - b);
                gameState.correctOrder = {};
                gameState.currentPositions.forEach(pos => {
                    gameState.correctOrder[pos] = FIXED_PAIRING[pos];
                    gameState.steps[pos] = null;
                });
                gameState.availableCards = solfegeData
                    .filter(item => gameState.currentPositions.includes(item.correctPosition))
                    .map((item, index) => ({
                        ...item,
                        cardId: `card-${index}`
                    }));
                shuffleArray(gameState.availableCards);
                generateCards();
                updateCurrentChallengeDisplay();
                updateStepVisibility(gameState.currentPositions);
                challengeNumber.textContent = gameState.currentChallenge;
                updateChallengeTypeDescription();
            }

            function updateCurrentChallengeDisplay() {
                currentChallengeNumbers.innerHTML = '';
                gameState.currentPositions.forEach(pos => {
                    const numberDiv = document.createElement('div');
                    numberDiv.className = 'challenge-number';
                    numberDiv.textContent = pos;
                    currentChallengeNumbers.appendChild(numberDiv);
                });
                const positionText = gameState.currentPositions.join(', ');
                const challengeSize = gameState.currentPositions.length;
                let description = challengeSize <= 3 ? "簡單挑戰" : (challengeSize <= 5 ? "中等挑戰" : "困難挑戰");
                randomChallengeInfo.textContent = `${description}：需要放置 ${challengeSize} 個階梯 (${positionText})`;
                challengeType.textContent = `${description} (${challengeSize}個階梯)`;
            }

            function updateChallengeTypeDescription() {
                const positions = gameState.currentPositions;
                let typeName = "隨機階梯組合";
                const isConsecutive = positions.every((pos, index, arr) => index === 0 || pos === arr[index-1] + 1);
                if (isConsecutive) {
                    typeName = `連續階梯 ${positions[0]}-${positions[positions.length-1]}`;
                } else if (positions.every(pos => pos % 2 === 1)) {
                    typeName = "奇數階梯組合";
                } else if (positions.every(pos => pos % 2 === 0)) {
                    typeName = "偶數階梯組合";
                } else if (positions.every(pos => pos <= 4)) {
                    typeName = "低音階梯";
                } else if (positions.every(pos => pos >= 5)) {
                    typeName = "高音階梯";
                }
                challengeType.textContent = typeName;
            }

            function generateCards() {
                cardsGrid.innerHTML = '';
                gameState.availableCards.forEach((cardData) => {
                    const card = document.createElement('div');
                    card.className = `solfege-card ${cardData.color}`;
                    card.dataset.solfege = cardData.name;
                    card.dataset.cardId = cardData.cardId;
                    card.dataset.correctPosition = cardData.correctPosition;
                    card.draggable = true;
                    card.innerHTML = `
                        <div>${cardData.name}</div>
                        <div class="animal-icon">${cardData.animal}</div>
                        <div class="position-hint">位置 ${cardData.correctPosition}</div>
                    `;
                    cardsGrid.appendChild(card);
                });
            }

            // 修改處：移除唱名文字，只顯示「第X階」
            function resetStaircaseDisplay() {
                steps.forEach(step => {
                    step.style.display = 'flex';
                    step.style.opacity = '1';
                    step.style.boxShadow = '';
                    const pos = parseInt(step.dataset.position);
                    step.innerHTML = `
                        <span class="step-label">第${pos}階</span>
                        <div class="step-number">${pos}</div>
                    `;
                    step.classList.remove('filled');
                    step.style.background = 'white';
                    step.style.border = '4px solid transparent';
                });
            }

            function updateStepVisibility(visiblePositions) {
                steps.forEach(step => {
                    const pos = parseInt(step.dataset.position);
                    step.style.display = visiblePositions.includes(pos) ? 'flex' : 'none';
                });
            }

            // 修改處：放卡片時，背後的標籤仍只顯示「第X階」
            function placeCard(stepElement, stepPosition, cardData) {
                gameState.steps[stepPosition] = cardData.solfege;
                gameState.placedCards++;
                const cardInfo = solfegeData.find(item => item.name === cardData.solfege);
                const isCorrect = (cardData.solfege === FIXED_PAIRING[stepPosition]);
                stepElement.innerHTML = `
                    <span class="step-label">第${stepPosition}階</span>
                    <div class="step-number">${stepPosition}</div>
                    <div style="font-size: 1.8rem; font-weight: bold; color: white; text-shadow: 2px 2px 0 rgba(0,0,0,0.2);">
                        ${cardData.solfege} <span class="animal-icon">${cardInfo.animal}</span>
                    </div>
                    ${isCorrect ? '<div class="correct-feedback">✓</div>' : '<div class="incorrect-feedback">✗</div>'}
                `;
                stepElement.classList.add('filled');
                stepElement.style.background = getCardColor(cardData.solfege);
                const cardElement = document.querySelector(`.solfege-card[data-card-id="${cardData.cardId}"]`);
                if (cardElement) {
                    cardElement.style.opacity = '0.3';
                    cardElement.style.cursor = 'not-allowed';
                    cardElement.draggable = false;
                }
                if (isCorrect) {
                    updateMessage(`✓ 正確！第${stepPosition}階應該放${FIXED_PAIRING[stepPosition]}！`, 'info');
                } else {
                    updateMessage(`注意：第${stepPosition}階應該放${FIXED_PAIRING[stepPosition]}，你放了${cardData.solfege}`, 'warning');
                }
                updateProgress();
                if (gameState.placedCards >= gameState.totalSlots) {
                    updateMessage(`所有位置都放好了！點擊「檢查答案」！`, 'info');
                }
            }

            // 修改處：移除卡片後恢復「第X階」
            function removeCard(stepPosition) {
                const solfege = gameState.steps[stepPosition];
                if (!solfege) return;
                gameState.steps[stepPosition] = null;
                gameState.placedCards--;
                const stepElement = document.querySelector(`.step[data-position="${stepPosition}"]`);
                stepElement.innerHTML = `
                    <span class="step-label">第${stepPosition}階</span>
                    <div class="step-number">${stepPosition}</div>
                `;
                stepElement.classList.remove('filled');
                stepElement.style.background = 'white';
                const cardElement = Array.from(document.querySelectorAll('.solfege-card')).find(card => 
                    card.dataset.solfege === solfege && card.style.opacity === '0.3'
                );
                if (cardElement) {
                    cardElement.style.opacity = '1';
                    cardElement.style.cursor = 'grab';
                    cardElement.draggable = true;
                }
                updateMessage(`移除了 ${solfege}，再試試看！`, 'info');
                updateProgress();
            }

            function checkAnswer() {
                if (gameState.placedCards < gameState.totalSlots) {
                    updateMessage(`還有位置沒放卡片哦！`, 'warning');
                    return;
                }
                let correctCount = 0;
                let wrongPositions = [];
                gameState.currentPositions.forEach(pos => {
                    if (gameState.steps[pos] === FIXED_PAIRING[pos]) {
                        correctCount++;
                    } else {
                        wrongPositions.push(pos);
                    }
                });
                const challengeScore = correctCount * 15;
                gameState.score += challengeScore;
                scoreDisplay.textContent = gameState.score;
                if (gameState.score > gameState.highScore) {
                    gameState.highScore = gameState.score;
                    localStorage.setItem('solfegeHighScore', gameState.highScore);
                    highScoreDisplay.textContent = gameState.highScore;
                }
                if (correctCount === gameState.totalSlots) {
                    updateMessage(`🎉 完美！所有配對都正確！ 🎉 獲得 ${challengeScore} 分！`, 'success');
                    gameState.isComplete = true;
                    nextBtn.style.display = 'block';
                    checkBtn.style.display = 'none';
                    document.querySelectorAll('.step').forEach(step => {
                        if (step.style.display !== 'none') {
                            step.classList.add('celebrate');
                        }
                    });
                    gameState.currentChallenge++;
                    challengeCount.textContent = gameState.currentChallenge;
                } else {
                    const correctPercent = Math.round((correctCount / gameState.totalSlots) * 100);
                    let feedback = `答對了 ${correctCount}/${gameState.totalSlots} 個 (${correctPercent}%)，獲得 ${challengeScore} 分。\n`;
                    if (wrongPositions.length > 0) {
                        feedback += `需要修正：`;
                        wrongPositions.forEach(pos => {
                            feedback += `第${pos}階(應該是${FIXED_PAIRING[pos]}) `;
                        });
                    }
                    updateMessage(feedback, 'warning');
                    wrongPositions.forEach(pos => {
                        const step = document.querySelector(`.step[data-position="${pos}"]`);
                        if (step) {
                            step.style.border = '4px solid #ff6b6b';
                            setTimeout(() => {
                                step.style.border = '4px solid transparent';
                            }, 1000);
                        }
                    });
                }
            }

            function resetChallenge() {
                resetGameState();
                generateRandomChallenge();
                updateProgress();
                updateMessage(`重新開始挑戰！這次是新的階梯組合！`, 'info');
                setupCardEvents();
            }

            function resetGameState() {
                gameState.currentPositions.forEach(pos => {
                    gameState.steps[pos] = null;
                });
                gameState.placedCards = 0;
                gameState.isComplete = false;
                const cards = document.querySelectorAll('.solfege-card');
                cards.forEach(card => {
                    card.style.opacity = '1';
                    card.style.cursor = 'grab';
                    card.draggable = true;
                });
            }

            function updateProgress() {
                const progress = (gameState.placedCards / gameState.totalSlots) * 100;
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${Math.round(progress)}%`;
                placedCount.textContent = gameState.placedCards;
            }

            function updateMessage(text, type = 'info') {
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
            }

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function getCardColor(solfege) {
                const colorMap = {
                    'Do': 'linear-gradient(135deg, #FF6B6B, #FF8E8E)',
                    'Re': 'linear-gradient(135deg, #FF9A3D, #FFB56B)',
                    'Mi': 'linear-gradient(135deg, #FFD93D, #FFE57F)',
                    'Fa': 'linear-gradient(135deg, #6BCF7F, #8FDF9E)',
                    'Sol': 'linear-gradient(135deg, #4D96FF, #6BAAFF)',
                    'La': 'linear-gradient(135deg, #9D4EDD, #B26FE6)',
                    'Ti': 'linear-gradient(135deg, #FF6B9D, #FF8EB5)'
                };
                return colorMap[solfege] || '#ffffff';
            }

            initGame();
        });
    </script>
</body>
